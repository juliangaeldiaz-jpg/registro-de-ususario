<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Usuario</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header{
      background: #4a90e2;
      color: white;
      text-align: center;
      padding: 20px;
    }

    main{
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .formulario{
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .perfil{
      text-align: center;
      margin-bottom: 20px;
    }

    .perfil img{
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }

    label{
      display: block;
      margin-top: 12px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input{
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    input[type="color"]{
      height: 45px;
      padding: 5px;
    }

    button{
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover{
      background: #357abd;
    }

    footer{
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
    }

    @media (max-width: 500px){
      .formulario{
        padding: 18px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Registro de Usuario</h1>
  </header>

  <main>
    <section class="formulario">

      <div class="perfil">
        <img src="https://via.placeholder.com/100" alt="Foto de perfil">
      </div>

      <form>

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>

        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" minlength="8" placeholder="Mínimo 8 caracteres" required>

        <label for="fecha">Fecha de Nacimiento</label>
        <input type="date" id="fecha" required>

        <label for="color">Color Favorito</label>
        <input type="color" id="color">

        <label for="pais">País</label>
        <input list="paises" id="pais" placeholder="Selecciona tu país">

        <datalist id="paises">
          <option value="México">
          <option value="Argentina">
          <option value="Colombia">
          <option value="España">
          <option value="Chile">
          <option value="Perú">
        </datalist>

        <button type="submit">Registrarse</button>

      </form>

    </section>
  </main>

  <footer>
    <p>Proyecto HTML Responsivo © 2026</p>
  </footer>

</body>
</html>
